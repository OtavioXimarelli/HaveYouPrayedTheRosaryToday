services:
  mongodb:
    ports:
      - "27017:27017"

  backend:
    environment:
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"

  mongo-express:
    image: mongo-express:1.0.2
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-rosary_admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-rosary_secret_2024}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-rosary_admin}:${MONGO_ROOT_PASSWORD:-rosary_secret_2024}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin123}
    depends_on:
      mongodb:
        condition: service_healthy


