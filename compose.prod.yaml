services:
  mongodb:
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-rosary_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rosary_root_password_2024}
      MONGO_INITDB_DATABASE: rosary-app
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "${MONGO_ROOT_USER:-rosary_root}",
          "-p",
          "${MONGO_ROOT_PASSWORD:-rosary_root_password_2024}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')"
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_ROOT_USER:-rosary_root}:${MONGO_ROOT_PASSWORD:-rosary_root_password_2024}@mongodb:27017/rosary-app?authSource=admin}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-for-rosary-app-2024}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-https://rosario.ximarelli.dev}
    expose:
      - "3001"

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://rosario.ximarelli.dev/api}
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://rosario.ximarelli.dev/api}
    expose:
      - "3000"


